# EEG Pipeline Configuration v7 — Bug修复 + 系统性验证后的训练配置
#
# 相比 v6 的改进：
#   1. stim_pos_weight 默认值修正（trainer_v2.py 已修复：99.0 而非 1.0）
#   2. val_phase_acc 和 val_stim_auroc 现在真正被计算和日志记录
#   3. 更丰富的训练日志（相位准确率、刺激AUROC、吞吐量、ETA）
#   4. 增加 steps_per_epoch 限制（防止大数据集单 epoch 太长）
#   5. WarmRestarts scheduler 可选（余弦退火改为带热重启）
#   6. 降低 seq_stride 以增加序列多样性（300→150，允许50%重叠）

eeg:
  channels: ["BIS/EEG1_WAV", "BIS/EEG2_WAV"]
  srate: 128

labels:
  tracks: ["BIS/BIS", "BIS/SQI", "BIS/SR"]
  target: "BIS/BIS"
  sqi_track: "BIS/SQI"
  sr_track: "BIS/SR"

windowing:
  window_sec: 4
  stride_sec: 1
  label_lag_sec: 15
  min_valid_label: 10
  max_valid_label: 100
  baseline_sec: 60

sqi:
  min_score: 0.5
  kurtosis_thresh: 5.0
  high_freq_ratio_thresh: 0.4

filters:
  median_kernel_ms: 20
  highpass_hz: 0.5
  lowpass_hz: 47.0
  notch_hz: [50.0]
  notch_q: 30.0

wavelet:
  wavelet: "db4"
  level: 5
  esu_energy_thresh: 3.0

features:
  bands:
    delta: [0.5, 4.0]
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta:  [13.0, 30.0]
    gamma: [30.0, 47.0]
  permutation_entropy:
    order: 6
    delay: 1
  sef95: true
  lzc: true
  bsr: true
  bsr_thresholds_uv: [2.0, 5.0, 10.0]
  bsr_window_sec: 4
  pac: false

model:
  # AnesthesiaNetV2 参数（与 v6 相同，已验证）
  cnn_channels: [32, 64, 128]
  cnn_kernel: 7
  # feature_dim = (5+1+1+1+3) * 2 + 2 = 24
  feature_dim: 24
  d_model: 128
  gru_layers: 2
  gru_dropout: 0.15
  lnn_backend: "gru"
  sqi_inertia_threshold: 0.5

training:
  model_version: "v2"

  # ── 序列参数 ──────────────────────────────────────────────────────────────
  seq_len: 300
  # v7 改进：seq_stride=150 (50%重叠) 增加序列多样性
  # 代价：训练序列数×2，用 steps_per_epoch 限制每 epoch 步数
  seq_stride: 150

  # ── 数据质量过滤 ──────────────────────────────────────────────────────────
  case_std_pct_low: 10
  case_std_pct_high: 90
  min_seq_std: 0.0
  balance_bis: false

  # ── 损失函数（已修复的参数）─────────────────────────────────────────────
  # focal_alpha=0.99: 正确上调刺激事件（正类）权重
  # stim_pos_weight=99.0: 补偿 144:1 类别不平衡（v6 中 trainer_v2.py 默认1.0已修复为99.0）
  focal_alpha:      0.99
  stim_pos_weight:  99.0
  focal_gamma:      2.0

  # ── UW-SO 自适应任务权重 ──────────────────────────────────────────────────
  use_auto_weight:  true
  auto_weight_temp: 0.5
  lambda_bis:   1.0
  lambda_phase: 0.5
  lambda_stim:  0.3
  lambda_mono:  0.3

  # ── 诱导期过采样 ──────────────────────────────────────────────────────────
  induction_boost: 15

  # ── 优化器 ───────────────────────────────────────────────────────────────
  batch_size: 32
  lr: 1.0e-4
  epochs: 200
  patience: 40
  noise_std: 0.05
  val_split: 0.15
  test_split: 0.1
  seed: 42

  # ── v7 新增：步数限制（防止单 epoch 因重叠序列过多而太长）──────────────
  # 设为 None 表示不限制
  # 建议：当 seq_stride=150 导致训练序列×2时，保持每 epoch ~1500 步
  steps_per_epoch: null

paths:
  raw_data: "raw_data"
  preprocessed: "outputs/preprocessed"
  checkpoints: "outputs/checkpoints/v7"
  logs: "outputs/logs/v7"
