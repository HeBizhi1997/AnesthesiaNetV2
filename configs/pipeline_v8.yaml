# EEG Pipeline Configuration v8 — 深度临床改进版
#
# 相比 v7 的改进（全部已实现并验证）：
#   1. [encoder.py]   WaveformEncoder bsr_layer=True — dilation=16 专用层，
#                     感受野从 406ms 扩展到 1.09s，检测深麻醉爆发抑制静默期
#   2. [lnn_core.py]  RecurrentWrapper 统一隐藏状态接口 — normalize_state/
#                     denormalize_state/init_state/mask_state，GRU/CfC 无感切换
#   3. [loss_v2.py]   增强单调性损失 — EMA 药代动力学趋势约束（ema_alpha=0.85
#                     对应约 6s 时间常数，匹配丙泊酚效应室平衡动力学）
#   4. [loader.py]    频带比例归一化 — FFT 检测 Delta 主导（>90%总功率）时
#                     切换至 Alpha+Beta 能量作为归一化基准，修复无清醒段场景
#   5. 数据预处理不变（dataset.h5 复用），只需重新训练模型

eeg:
  channels: ["BIS/EEG1_WAV", "BIS/EEG2_WAV"]
  srate: 128

labels:
  tracks: ["BIS/BIS", "BIS/SQI", "BIS/SR"]
  target: "BIS/BIS"
  sqi_track: "BIS/SQI"
  sr_track: "BIS/SR"

windowing:
  window_sec: 4
  stride_sec: 1
  label_lag_sec: 15
  min_valid_label: 10
  max_valid_label: 100
  baseline_sec: 60

# v8 新增：频带比例归一化参数
normalization:
  use_band_ratio: true
  delta_dominance_thresh: 0.90
  alpha_beta_band_hz: [8.0, 30.0]

sqi:
  min_score: 0.5
  kurtosis_thresh: 5.0
  high_freq_ratio_thresh: 0.4

filters:
  median_kernel_ms: 20
  highpass_hz: 0.5
  lowpass_hz: 47.0
  notch_hz: [60.0]   # VitalDB = 韩国数据，工频60Hz（非欧洲/中国的50Hz）
                     # 注：lowpass=47Hz的MNE FIR已将60Hz衰减>80dB，notch实为冗余
                     # 此处修正仍有意义：明确语义，防止误导未来维护者
  notch_q: 30.0

wavelet:
  wavelet: "db4"
  level: 5
  esu_energy_thresh: 3.0

features:
  bands:
    delta: [0.5, 4.0]
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta:  [13.0, 30.0]
    gamma: [30.0, 47.0]
  permutation_entropy:
    order: 6
    delay: 1
  sef95: true
  lzc: true
  bsr: true
  bsr_thresholds_uv: [2.0, 5.0, 10.0]
  bsr_window_sec: 4
  pac: false

model:
  # AnesthesiaNetV2 参数
  cnn_channels: [32, 64, 128]
  cnn_kernel: 7
  # feature_dim = (5+1+1+1+3) * 2 + 2 = 24
  feature_dim: 24
  d_model: 128
  gru_layers: 2
  gru_dropout: 0.15
  lnn_backend: "gru"
  sqi_inertia_threshold: 0.5
  # v8 新增：BSR dilation=16 专用层
  bsr_layer: true
  # 梯度检查点：重计算 CNN 前向以节省 ~5 GB VRAM，代价是 backward ~30% 更慢
  grad_checkpoint: true

training:
  model_version: "v2"

  # ── 序列参数 ──────────────────────────────────────────────────────────────
  seq_len: 300
  seq_stride: 150    # 50% 重叠，增加序列多样性

  # ── 数据质量过滤 ──────────────────────────────────────────────────────────
  case_std_pct_low: 10
  case_std_pct_high: 90
  min_seq_std: 0.0
  balance_bis: false

  # ── 损失函数 ─────────────────────────────────────────────────────────────
  # stim_pos_weight=99 + focal_alpha=0.99 was BROKEN: effective 9801:1 per-sample
  # gradient ratio drives stim head to predict p≈0.986 for ALL timesteps → AUROC=0.5
  # and StimulationCorrector applies constant offset to every BIS prediction → corrupts BIS.
  # Fix: alpha=0.5 (symmetric), pos_weight=15 (~sqrt(144:1 imbalance)). Focal gamma=2 intact.
  focal_alpha:      0.5
  stim_pos_weight:  15.0
  focal_gamma:      2.0

  # ── 固定任务权重（与 v7 相同，UW-SO 在 seq_len=300→val_seq=10 下导致 BIS 过拟合）
  use_auto_weight:  false
  auto_weight_temp: 0.5
  lambda_bis:   1.0
  lambda_phase: 0.5
  lambda_stim:  0.3
  lambda_mono:  0.3

  # ── 诱导期过采样 ──────────────────────────────────────────────────────────
  induction_boost: 15

  # ── 优化器 ───────────────────────────────────────────────────────────────
  batch_size: 32
  lr: 1.0e-4
  epochs: 200
  patience: 40
  noise_std: 0.05
  val_split: 0.15
  test_split: 0.1
  seed: 42

  steps_per_epoch: null

paths:
  raw_data: "raw_data"
  preprocessed: "outputs/preprocessed"
  checkpoints: "outputs/checkpoints/v8"
  logs: "outputs/logs/v8"
