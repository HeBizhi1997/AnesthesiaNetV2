# EEG Pipeline Configuration v3
#
# Data quality improvements based on distribution analysis:
#
# Problem diagnosed in v2:
#   - 80.4% of training sequences have BIS std < 5 (near-flat, zero training value)
#   - BIS 40-50 (deep maintenance) = 72% of sequences
#   - BIS 70-100 (induction/emergence, clinically critical) = only 3.7% of sequences
#   - Model learns to output ~45 for all inputs → style fixation
#   - Train loss falls, val MAE diverges after epoch 4 → distribution mismatch
#
# v3 fixes (following data quality document):
#   1. min_seq_std=5.0  — remove flat sequences (bottom 80% by variation)
#      Sequences where BIS barely moves have near-zero gradient signal.
#      Removing them cuts dataset from ~43K to ~8K sequences but each
#      sequence now contains a real BIS change (induction, emergence, fluctuation).
#
#   2. balance_bis=true — WeightedRandomSampler equalizes BIS bin frequency
#      BIS 70-100 sequences get ~20x higher sampling weight than BIS 40-50.
#      This aligns training distribution with production distribution
#      (anesthesiologist needs accurate predictions across the full range).
#
#   3. lr: 5e-4 → 1e-4  — lower LR for stability after distribution change
#      With balanced sampling, each mini-batch contains more "hard" examples
#      (induction/emergence) where loss is initially high. Lower LR prevents
#      overshooting in these steep loss regions.
#
#   4. patience: 30 → 20  — faster convergence detection on smaller dataset

eeg:
  channels: ["BIS/EEG1_WAV", "BIS/EEG2_WAV"]
  srate: 128

labels:
  tracks: ["BIS/BIS", "BIS/SQI", "BIS/SR"]
  target: "BIS/BIS"
  sqi_track: "BIS/SQI"
  sr_track: "BIS/SR"

windowing:
  window_sec: 4
  stride_sec: 1
  label_lag_sec: 15
  min_valid_label: 10
  max_valid_label: 100
  baseline_sec: 60

sqi:
  min_score: 0.5
  kurtosis_thresh: 5.0
  high_freq_ratio_thresh: 0.4

filters:
  median_kernel_ms: 20
  highpass_hz: 0.5
  lowpass_hz: 47.0
  notch_hz: [50.0]
  notch_q: 30.0

wavelet:
  wavelet: "db4"
  level: 5
  esu_energy_thresh: 3.0

features:
  bands:
    delta: [0.5, 4.0]
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta:  [13.0, 30.0]
    gamma: [30.0, 47.0]
  permutation_entropy:
    order: 6
    delay: 1
  sef95: true
  lzc: true
  bsr: true
  bsr_thresholds_uv: [2.0, 5.0, 10.0]
  bsr_window_sec: 4

model:
  cnn_channels: [32, 64, 128]
  cnn_kernel: 7
  feature_dim: 24
  lnn_units: 64
  lnn_sparsity: 0.5
  lnn_backend: "gru"
  output_range: [0, 100]

training:
  seq_len: 300
  seq_stride: 300

  # Data quality filters (文档: 困惑度过滤 + 去除两端极值)
  min_seq_std: 5.0      # drop flat sequences (BIS std < 5 in raw units)
  balance_bis: false    # natural distribution of filtered sequences is already more balanced

  batch_size: 32
  lr: 3.0e-4
  epochs: 200
  patience: 20
  lambda_monotonic: 0.5
  lambda_physio: 0.0
  noise_std: 0.05
  val_split: 0.15
  test_split: 0.1
  seed: 42

paths:
  raw_data: "raw_data"
  preprocessed: "outputs/preprocessed"
  checkpoints: "outputs/checkpoints/v3"
  logs: "outputs/logs"
